const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, img = null, imgRatio = 1, photos = [];
const GRAVITY = 0.12, BOUNCE_MIN = 0.3, BOUNCE_MAX = 0.85, FRICTION = 0.999, MIN_VEL = 0.2, SPAWN_MIN = 30, SPAWN_MAX = 60;

function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
window.addEventListener('resize', resize); resize();

const i = new Image();
i.onload = () => { img = i; imgRatio = i.width / i.height; };
i.src = EMBEDDED_SRC;

document.getElementById('clear-btn').addEventListener('click', () => { photos = []; updateCounter(); });
function updateCounter() { document.getElementById('photo-count').textContent = photos.length; }

function spawnBatch(tapX) {
  const count = SPAWN_MIN + Math.floor(Math.random() * (SPAWN_MAX - SPAWN_MIN + 1));
  for (let n = 0; n < count; n++) {
    const h = 30 + Math.random() * 200, w = h * imgRatio;
    const x = tapX + (Math.random() - 0.5) * W * 0.4;
    const y = -h - Math.random() * 400;
    photos.push({ x, y, w, h, vx: (Math.random()-0.5)*3, vy: Math.random()*1.5, rotation: 0, rotationSpeed: 0, opacity: 1, settled: false, bounceCount: 0, shadow: 4+Math.random()*12, bounceDamping: BOUNCE_MIN+Math.random()*(BOUNCE_MAX-BOUNCE_MIN), gravityMult: 0.5+Math.random() });
  }
  updateCounter();
}

function updatePhoto(p) {
  p.vy += GRAVITY * p.gravityMult; p.x += p.vx; p.y += p.vy; p.vx *= FRICTION;
  const floor = H - 10;
  if (p.y + p.h/2 >= floor && p.vy > 0) {
    p.y = floor - p.h/2; p.vy = -Math.abs(p.vy) * p.bounceDamping; p.vx *= 0.9; p.bounceCount++;
    if (Math.abs(p.vy) < MIN_VEL) { p.vy = 0; p.settled = true; }
  }
  if (p.x - p.w/2 < 0) { p.x = p.w/2; p.vx = Math.abs(p.vx)*0.5; }
  if (p.x + p.w/2 > W) { p.x = W - p.w/2; p.vx = -Math.abs(p.vx)*0.5; }
}

function drawPhoto(p) {
  ctx.save(); ctx.translate(p.x, p.y); ctx.globalAlpha = 1;
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = p.shadow; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 3;
  ctx.drawImage(img, -p.w/2, -p.h/2, p.w, p.h);
  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, W, H); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  if (!img) { requestAnimationFrame(loop); return; }
  for (const p of photos) { if (!p.settled) updatePhoto(p); drawPhoto(p); }
  ctx.globalAlpha = 1; requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function onTap(e) {
  e.preventDefault(); if (!img) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  spawnBatch(x);
}
canvas.addEventListener('mousedown', onTap);
canvas.addEventListener('touchstart', onTap, { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
