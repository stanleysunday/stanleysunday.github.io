<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; height: 100%; }
  #grid { touch-action: none; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    width: min(90vw, 90vh);
  }
  @media (max-width: 600px) {
    #grid {
      grid-template-columns: repeat(4, 1fr);
      width: 100vw;
      gap: 2px;
  }
  .cell {
    aspect-ratio: 1;
    cursor: pointer;
    overflow: hidden;
  }
  .cell canvas {
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="grid"></div>

<!-- Hidden video source -->
<video id="src-video" 
  style="display:none;position:absolute;left:-9999px"
  preload="auto"
  playsinline
  muted
  crossorigin="anonymous">
</video>

<script>
// Embed video as base64 - will be replaced by sed

const isMobile = window.matchMedia('(max-width: 600px)').matches;
const COLS = isMobile ? 4 : 5;
const ROWS = isMobile ? 6 : 5;
const grid = document.getElementById('grid');
const srcVideo = document.getElementById('src-video');

// Set video source
srcVideo.src = 'https://res.cloudinary.com/dwkzyfnvc/video/upload/v1776250786/videoAL_bi5ca5.mp4';

// Cell state machine
// States: 'idle' | 'playing'
const cells = [];

function createCell(index) {
  const div = document.createElement('div');
  div.className = 'cell';
  
  const canvas = document.createElement('canvas');
  canvas.width = 160;
  canvas.height = 160;
  div.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  
  // Each cell has its own video element cloned from source
  const video = document.createElement('video');
  video.preload = 'auto';
  video.muted = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
  document.body.appendChild(video);
  video.src = srcVideo.src;
  
  let state = 'idle';
  let rafId = null;
  let videoReady = false;

  video.addEventListener('loadeddata', () => {
    videoReady = true;
    // Draw first frame
    video.currentTime = 0;
  });

  video.addEventListener('seeked', () => {
    if (state === 'idle') {
      drawFrame();
    }
  });

  video.addEventListener('ended', () => {
    // Go back to frame 0 and wait
    state = 'idle';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    video.currentTime = 0;
  });

  function drawFrame() {
    if (videoReady) {
      ctx.drawImage(video, 0, 0, 160, 160);
    } else {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, 160, 160);
    }
  }

  function renderLoop() {
    drawFrame();
    if (state === 'playing') {
      rafId = requestAnimationFrame(renderLoop);
    }
  }

  function activate() {
    if (state === 'playing') return;
    state = 'playing';
    video.currentTime = 0;
    video.play().then(() => {
      renderLoop();
    }).catch(() => {
      state = 'idle';
    });
  }

  div._activate = activate;
  
  // Load video
  video.load();

  return { div, video, ctx, canvas };
}

// Build grid
for (let i = 0; i < COLS * ROWS; i++) {
  const cell = createCell(i);
  cells.push(cell);
  grid.appendChild(cell.div);
}

// Desktop: hover activates
grid.addEventListener('mousemove', (e) => {
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el && el.classList.contains('cell')) {
    el._activate && el._activate();
  }
});

// Mobile: unlock all videos on first touch, then activate on drag
let touching = false;
let unlocked = false;

function unlockAll() {
  if (unlocked) return;
  unlocked = true;
  // Play+pause all videos simultaneously inside the touchstart gesture
  // so iOS considers them all unlocked for future play() calls
  cells.forEach(cell => {
    cell.video.play().then(() => cell.video.pause()).catch(() => {});
  });
}

function activateAtPoint(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  if (el && el.classList.contains('cell')) {
    el._activate && el._activate();
  }
}

grid.addEventListener('touchstart', (e) => {
  unlockAll();
  touching = true;
  const t = e.touches[0];
  activateAtPoint(t.clientX, t.clientY);
}, { passive: true });

grid.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!touching) return;
  const t = e.touches[0];
  activateAtPoint(t.clientX, t.clientY);
}, { passive: false });

grid.addEventListener('touchend', () => { touching = false; }, { passive: true });
</script>
</body>
</html>
