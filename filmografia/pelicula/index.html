<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stanley Sunday</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff;
  color: #000;
  font-family: monospace;
  font-size: 13px;
}
#top {
  padding: 20px 28px 14px;
}
.back {
  color: #000;
  text-decoration: none;
}
.back:visited { color: #000; }
#titulo {
  margin-top: 8px;
  line-height: 1.4;
}
.embed {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
}
.embed iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: 0;
}
@media (max-width: 600px) {
  #top { padding: 14px 16px 10px; }
}
</style>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
</head>
<body>
<div id="top">
  <a class="back" href="../">← filmografia</a>
  <div id="titulo"></div>
</div>
<div class="embed">
  <iframe id="player" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>
<script>
const p = new URLSearchParams(location.search);
const v = p.get('v');
const t = p.get('t');
if (v) {
  document.getElementById('player').src = 'https://player.vimeo.com/video/' + v;
}
if (t) {
  document.getElementById('titulo').textContent = t;
  document.title = t + ' — Stanley Sunday';
}
</script>
</body>
</html>
