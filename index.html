<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STANLEY SUNDAY WEB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #f0ede6;
  --ink: #1a1a18;
  --dim: #8a8880;
  --line: #c8c4bc;
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  cursor: crosshair;
}

/* Grain overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:100;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
}

/* Layout */
.container {
  width:100%; height:100%;
  display:grid;
  grid-template-rows: 1fr auto 1fr;
  padding: clamp(24px, 5vw, 60px);
}

/* Header */
header {
  align-self: start;
  display:flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--line);
  padding-bottom: 16px;
}

.title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(22px, 5vw, 42px);
  letter-spacing: -0.02em;
  line-height: 1;
}

.title em {
  font-style: italic;
  color: var(--dim);
}

.meta {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.8;
  padding-top: 4px;
}

/* Nav central */
nav {
  align-self: center;
}

.nav-list {
  list-style: none;
  display:flex;
  flex-direction: column;
  gap: 0;
}

.nav-item {
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 18px 0;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  text-decoration: none;
  color: inherit;
}

.nav-item:last-child {
  border-bottom: 1px solid var(--line);
}

.nav-item::after {
  content:'';
  position:absolute; inset:0;
  background: var(--ink);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s cubic-bezier(.16,1,.3,1);
  z-index:-1;
}

.nav-item:hover::after { transform: scaleX(1); }
.nav-item:hover { color: var(--bg); }
.nav-item:hover .nav-num { color: var(--bg); opacity:0.4; }
.nav-item:hover .nav-tag { color: var(--bg); opacity:0.5; }

.nav-num {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.08em;
  font-weight: 300;
}

.nav-name {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(18px, 3.5vw, 28px);
  letter-spacing: -0.01em;
}

.nav-tag {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-align: right;
}

/* Footer */
footer {
  align-self: end;
  display:flex;
  justify-content: space-between;
  align-items: flex-end;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}

.footer-left {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  line-height: 2;
}

.dot {
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  background: var(--ink);
  margin-right: 6px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.3; transform:scale(0.7); }
}

.footer-right {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: right;
  line-height: 2;
}

/* Entrada animada */
.container { opacity:0; animation: fadeIn 0.6s ease forwards 0.1s; }
@keyframes fadeIn { to { opacity:1; } }

.nav-item {
  opacity:0;
  transform: translateY(8px);
  animation: slideIn 0.4s ease forwards;
}
.nav-item:nth-child(1) { animation-delay: 0.2s; }
.nav-item:nth-child(2) { animation-delay: 0.3s; }
.nav-item:nth-child(3) { animation-delay: 0.4s; }
.nav-item:nth-child(4) { animation-delay: 0.5s; }

@keyframes slideIn {
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title">Stanley<br><em>Sunday</em></div>
    <div class="meta">
      Web<br>
      Barcelona<br>
      ©2026
    </div>
  </header>

  <nav>
    <ul class="nav-list">
      <li>
        <a class="nav-item" href="./dropmates/">
          <span class="nav-num">01</span>
          <span class="nav-name">Dropmates</span>
          <span class="nav-tag">Juego</span>
        </a>
      </li>
      <li>
        <a class="nav-item" href="./lluvia/">
          <span class="nav-num">02</span>
          <span class="nav-name">Lluvia de Fotos</span>
          <span class="nav-tag">Interactivo</span>
        </a>
      </li>
      <li>
        <a class="nav-item" href="./dianahead/">
          <span class="nav-num">03</span>
          <span class="nav-name">Diana Head</span>
          <span class="nav-tag">Experimento</span>
        </a>
      </li>
    </ul>
  </nav>

  <footer>
    <div class="footer-left">
      <span class="dot"></span>Online<br>
      HTML · CSS · JS
    </div>
    <div class="footer-right">
      Versión 1.0<br>
      Marzo 2026
    </div>
  </footer>

</div>
</body>
</html>
