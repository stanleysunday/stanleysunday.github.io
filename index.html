<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stanley Sunday</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }

canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

nav {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(36px, 7vw, 100px);
  pointer-events: none;
}

.site-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(52px, 10vw, 130px);
  letter-spacing: -.02em;
  line-height: 1;
  color: #000;
  margin-bottom: clamp(32px, 6vh, 72px);
  user-select: none;
}

ul {
  list-style: none;
  pointer-events: all;
}

ul li {
  margin-bottom: clamp(6px, 1.2vh, 16px);
}

ul li a {
  text-decoration: none;
  color: #000;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(18px, 3vw, 38px);
  letter-spacing: -.01em;
  opacity: .35;
  transition: opacity .15s;
}

ul li a:hover { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<nav>
  <p class="site-title">Stanley<br>Sunday</p>
  <ul>
    <li><a href="./dropmates/">Dropmates</a></li>
    <li><a href="./lluvia/">Lluvia de Fotos</a></li>
    <li><a href="./dianahead/">Diana Head</a></li>
  </ul>
</nav>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

const img = new Image();
img.src = 'caballitosalchicha.png';

const s = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  w: 0, h: 0,
  angle: 0,
  av: 0,
  ready: false
};

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (!s.ready) return;
  s.x = Math.min(Math.max(s.x, s.w / 2), W - s.w / 2);
  s.y = Math.min(Math.max(s.y, s.h / 2), H - s.h / 2);
}
window.addEventListener('resize', resize);

img.onload = () => {
  resize();

  s.w = Math.min(Math.round(W * 0.2), 280);
  s.h = Math.round(s.w * img.naturalHeight / img.naturalWidth);

  s.x = W * 0.68;
  s.y = H * 0.32;

  const spd = Math.min(W, H) * 0.0016;
  const ang = Math.random() * Math.PI * 2;
  s.vx = Math.cos(ang) * spd;
  s.vy = Math.sin(ang) * spd;
  s.av = (Math.random() - 0.5) * 0.0015;

  s.ready = true;
  loop();
};

function loop() {
  requestAnimationFrame(loop);
  if (!s.ready) return;

  ctx.clearRect(0, 0, W, H);

  s.x += s.vx;
  s.y += s.vy;
  s.angle += s.av;

  const hw = s.w / 2, hh = s.h / 2;

  if (s.x - hw < 0)  { s.x = hw;     s.vx =  Math.abs(s.vx); nudge(); }
  if (s.x + hw > W)  { s.x = W - hw; s.vx = -Math.abs(s.vx); nudge(); }
  if (s.y - hh < 0)  { s.y = hh;     s.vy =  Math.abs(s.vy); nudge(); }
  if (s.y + hh > H)  { s.y = H - hh; s.vy = -Math.abs(s.vy); nudge(); }

  function nudge() {
    s.av += (Math.random() - 0.5) * 0.0012;
    s.av  = Math.max(-0.005, Math.min(0.005, s.av));
  }

  s.av *= 0.999;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  ctx.drawImage(img, -hw, -hh, s.w, s.h);
  ctx.restore();
}
</script>
</body>
</html>
