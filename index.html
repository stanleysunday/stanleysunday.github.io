<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stanley Sunday</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #fff;
}

canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#nav {
  position: fixed;
  top: 28px;
  left: 28px;
  z-index: 1;
  font-family: monospace;
  font-size: 13px;
}

#nav .name {
  display: block;
  color: #000;
  text-decoration: none;
  font-size: 32px;
  font-weight: normal;
  letter-spacing: -1px;
  line-height: 1;
}

#nav .other-links {
  margin-top: 10px;
}

#nav .other-links a {
  display: block;
  color: #000;
  text-decoration: underline;
  line-height: 2.2;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="nav">
  <span class="name">Stanley Sunday</span>
  <div class="other-links">
    <a href="./filmografia/">filmografia</a>
    <div style="height:22px"></div>
    <a href="./dropmates/">dropmates</a>
    <a href="./lluvia/">chof</a>
    <a href="./gloria_editor.html">gloria editor</a>
    <a href="./video-grid.html">video grid</a>
    <a href="./papel-de-cartas.html">papel de cartas</a>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

const img = new Image();
img.src = 'caballitosalchicha.png';

const s = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  w: 0, h: 0,
  angle: 0,
  av: 0,
  ready: false
};

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (!s.ready) return;
  s.x = Math.min(Math.max(s.x, s.w / 2), W - s.w / 2);
  s.y = Math.min(Math.max(s.y, s.h / 2), H - s.h / 2);
}
window.addEventListener('resize', resize);

img.onload = () => {
  resize();

  s.w = Math.min(Math.round(W * (W < 600 ? 0.32 : 0.2)), 280);
  s.h = Math.round(s.w * img.naturalHeight / img.naturalWidth);

  s.x = W * 0.68;
  s.y = H * 0.32;

  const spd = Math.min(W, H) * 0.0016;
  const ang = Math.random() * Math.PI * 2;
  s.vx = Math.cos(ang) * spd;
  s.vy = Math.sin(ang) * spd;
  s.av = (Math.random() - 0.5) * 0.0015;

  s.ready = true;
  loop();
};

function loop() {
  requestAnimationFrame(loop);
  if (!s.ready) return;

  ctx.clearRect(0, 0, W, H);

  s.x += s.vx;
  s.y += s.vy;
  s.angle += s.av;

  const hw = s.w / 2, hh = s.h / 2;

  if (s.x - hw < 0)  { s.x = hw;     s.vx =  Math.abs(s.vx); nudge(); }
  if (s.x + hw > W)  { s.x = W - hw; s.vx = -Math.abs(s.vx); nudge(); }
  if (s.y - hh < 0)  { s.y = hh;     s.vy =  Math.abs(s.vy); nudge(); }
  if (s.y + hh > H)  { s.y = H - hh; s.vy = -Math.abs(s.vy); nudge(); }

  function nudge() {
    s.av += (Math.random() - 0.5) * 0.0012;
    s.av  = Math.max(-0.005, Math.min(0.005, s.av));
  }

  s.av *= 0.999;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  ctx.drawImage(img, -hw, -hh, s.w, s.h);
  ctx.restore();
}
</script>
</body>
</html>
